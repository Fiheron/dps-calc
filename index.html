<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS ROF Calculator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg-main: #0f172a;
        --bg-panel: #1e293b;
        --bg-input: #0f172a;
        --accent-cyan: #06b6d4;
        --accent-cyan-glow: rgba(6, 182, 212, 0.3);
        --text-main: #f8fafc;
        --text-muted: #94a3b8;
        --color-ideal: #cbd5e1;
        --color-actual: #10b981;
        --color-loss: #f43f5e;
        --color-warning: #eab308;
    }

    body {
        background-color: var(--bg-main);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
    }

    .header {
        text-align: center;
        margin-bottom: 40px;
        animation: fadeInDown 0.6s ease-out;
    }

    .header h1 {
        color: var(--text-main);
        margin: 0 0 8px 0;
        font-size: 36px;
        font-weight: 800;
        letter-spacing: -0.5px;
        text-shadow: 0 0 20px var(--accent-cyan-glow);
    }
    
    .header h1 span {
        color: var(--accent-cyan);
    }

    .header p {
        color: var(--text-muted);
        margin: 0;
        font-size: 15px;
        text-transform: uppercase;
        letter-spacing: 3px;
        font-weight: 600;
    }

    .container {
        display: flex;
        flex-direction: column;
        gap: 30px;
        width: 100%;
        max-width: 540px;
    }

    .input-section {
        background: var(--bg-panel);
        padding: 30px;
        border-radius: 16px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        border: 1px solid rgba(255, 255, 255, 0.05);
        animation: fadeInUp 0.5s ease-out;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-group:last-child {
        margin-bottom: 0;
    }

    .form-group label {
        display: block;
        color: var(--text-muted);
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 10px;
    }

    .form-group input {
        width: 100%;
        padding: 14px 16px;
        background: var(--bg-input);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        color: #fff;
        font-family: 'JetBrains Mono', monospace;
        font-size: 18px;
        box-sizing: border-box;
        transition: all 0.2s ease;
    }

    .form-group input:focus {
        border-color: var(--accent-cyan);
        outline: none;
        box-shadow: 0 0 0 4px var(--accent-cyan-glow);
    }

    input[type=number]::-webkit-inner-spin-button, 
    input[type=number]::-webkit-outer-spin-button { 
        -webkit-appearance: none; 
        margin: 0; 
    }
    input[type=number] {
        -moz-appearance: textfield;
    }

    .results-section {
        display: none;
        width: 100%;
        flex-direction: column;
        gap: 20px;
        animation: fadeIn 0.4s ease-out;
    }
    
    .buff-stats-container {
        display: none;
        width: 100%;
    }

    .table-container {
        border-radius: 16px;
        overflow: hidden;
        background: var(--bg-panel);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    table {
        width: 100%;
        border-collapse: collapse;
    }

    th, td {
        padding: 16px 20px;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    th {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        font-weight: 800;
        background: rgba(0, 0, 0, 0.2);
    }

    td {
        font-size: 15px;
        font-weight: 600;
    }

    td.right, th.right {
        text-align: right;
    }

    td.mono {
        font-family: 'JetBrains Mono', monospace;
    }

    .table-base th { color: var(--accent-cyan); border-top: 3px solid var(--accent-cyan); }
    .table-base td.ideal { color: var(--color-ideal); font-weight: normal; }
    .table-base td.actual { color: var(--color-actual); font-weight: 800; font-size: 17px; }
    
    .table-final th { color: var(--color-actual); border-top: 3px solid var(--color-actual); }
    .table-final td.ideal { color: var(--color-ideal); font-weight: normal; }
    .table-final td.actual { color: var(--color-actual); font-weight: 800; font-size: 17px; }

    .table-analysis th { color: var(--color-warning); border-top: 3px solid var(--color-warning); }
    .table-analysis td.loss-value { color: var(--color-loss); font-weight: 800; }

    .error {
        color: var(--color-loss);
        font-weight: 600;
        margin-bottom: 20px;
        display: none;
        text-align: center;
        border: 1px solid rgba(244, 63, 94, 0.3);
        padding: 14px;
        background: rgba(244, 63, 94, 0.1);
        border-radius: 10px;
        font-size: 14px;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="header">
    <h1>TDS <span>ROF</span> CALCULATOR</h1>
    <p>Live Firerate & DPS Analyzer</p>
</div>

<div class="container">
    <div class="input-section">
        <div id="error-msg" class="error"></div>
        <div class="form-group">
            <label>Base Firerate (Seconds)</label>
            <input type="number" id="b_fr" autocomplete="off" placeholder="e.g. 0.1" step="any">
        </div>
        <div class="form-group">
            <label>Base Damage Per Shot</label>
            <input type="number" id="b_dmg" autocomplete="off" placeholder="e.g. 20" step="any">
        </div>
        <div class="form-group">
            <label>Total Firerate Buff % (Optional)</label>
            <input type="number" id="fr_b" autocomplete="off" placeholder="e.g. 50" step="any">
        </div>
    </div>

    <div class="results-section" id="results">
        <div class="table-container table-base">
            <table>
                <thead>
                    <tr><th colspan="3">BASE STATS (No Buffs)</th></tr>
                    <tr><th>Metric</th><th class="right" style="color:var(--color-ideal);font-weight:normal;">IDEAL</th><th class="right">ACTUAL</th></tr>
                </thead>
                <tbody id="base-tbody"></tbody>
            </table>
        </div>

        <div id="buff-stats-container" class="buff-stats-container">
            <div class="table-container table-final">
                <table>
                    <thead>
                        <tr><th colspan="3">BUFF STATS</th></tr>
                        <tr><th>Metric</th><th class="right" style="color:var(--color-ideal);font-weight:normal;">IDEAL</th><th class="right">ACTUAL</th></tr>
                    </thead>
                    <tbody id="final-tbody"></tbody>
                </table>
            </div>
        </div>

        <div class="table-container table-analysis">
            <table>
                <thead>
                    <tr><th colspan="2">ANALYSIS</th></tr>
                    <tr><th>Metric</th><th class="right">Value</th></tr>
                </thead>
                <tbody id="analysis-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
function parseInput(val) {
    if (!val) return "";
    return val.replace(',', '.');
}

function getRobloxFrames(seconds) {
    const EPSILON = 1e-9;
    let raw_frames = seconds * 60;
    
    if (Math.abs(raw_frames - Math.round(raw_frames)) < EPSILON) {
        return Math.round(raw_frames) + 1.5;
    } else {
        return Math.ceil(raw_frames) + 1;
    }
}

function calculate() {
    let err = document.getElementById('error-msg');
    let res = document.getElementById('results');
    let buffStatsContainer = document.getElementById('buff-stats-container');
    
    let b_fr_str = parseInput(document.getElementById('b_fr').value);
    let b_dmg_str = parseInput(document.getElementById('b_dmg').value);
    let fr_b_str = parseInput(document.getElementById('fr_b').value);
    
    if (!b_fr_str || !b_dmg_str) {
        err.style.display = 'none';
        res.style.display = 'none';
        return;
    }
    
    let b_fr = parseFloat(b_fr_str);
    let b_dmg = parseFloat(b_dmg_str);
    let fr_b = fr_b_str ? parseFloat(fr_b_str) : 0.0;
    
    if (isNaN(b_fr) || isNaN(b_dmg) || isNaN(fr_b) || b_fr <= 0 || b_dmg < 0) {
        err.innerText = "Please enter valid positive numbers.";
        err.style.display = 'block';
        res.style.display = 'none';
        return;
    }
    
    err.style.display = 'none';

    let b_fr_capped = Math.max(0.02, b_fr);

    let b_dps_i = b_dmg / b_fr_capped;
    let b_frames = getRobloxFrames(b_fr_capped);
    let b_fr_act = b_frames / 60;
    let b_sps_act = 1 / b_fr_act;
    let b_dps_act = b_dmg * b_sps_act;
    let b_sps_i = 1 / b_fr_capped;

    let b_dps_loss = b_dps_i - b_dps_act;
    let b_dps_loss_pct = 0;
    if (b_dps_i > 0) {
        b_dps_loss_pct = (b_dps_loss / b_dps_i) * 100;
    }

    document.getElementById('base-tbody').innerHTML = 
        "<tr><td>Firerate</td><td class='right ideal mono'>" + b_fr_capped.toFixed(6) + "s</td><td class='right actual mono'>" + b_fr_act.toFixed(6) + "s</td></tr>" +
        "<tr><td>Shots/sec</td><td class='right ideal mono'>" + b_sps_i.toFixed(2) + "</td><td class='right actual mono'>" + b_sps_act.toFixed(2) + "</td></tr>" +
        "<tr><td>DPS</td><td class='right ideal mono'>" + b_dps_i.toFixed(2) + "</td><td class='right actual mono'>" + b_dps_act.toFixed(2) + "</td></tr>";

    if (fr_b > 0) {
        let fr_i_raw = b_fr / (1 + fr_b / 100);
        let fr_i = Math.max(0.02, fr_i_raw);
        let sps_i = 1 / fr_i;
        let dps_i = b_dmg * sps_i;
        
        let final_frames = getRobloxFrames(fr_i);
        let fr_act = final_frames / 60;
        let sps_act = 1 / fr_act;
        let dps_act = b_dmg * sps_act;
        
        let fr_inc_pct = 0;
        if (b_sps_act > 0) {
            fr_inc_pct = ((sps_act - b_sps_act) / b_sps_act) * 100;
        }

        let dps_loss = dps_i - dps_act;
        let dps_loss_pct = 0;
        if (dps_i > 0) {
            dps_loss_pct = (dps_loss / dps_i) * 100;
        }

        document.getElementById('final-tbody').innerHTML = 
            "<tr><td>Firerate</td><td class='right ideal mono'>" + fr_i.toFixed(6) + "s</td><td class='right actual mono'>" + fr_act.toFixed(6) + "s</td></tr>" +
            "<tr><td>Shots/sec</td><td class='right ideal mono'>" + sps_i.toFixed(2) + "</td><td class='right actual mono'>" + sps_act.toFixed(2) + "</td></tr>" +
            "<tr><td>DPS</td><td class='right ideal mono'>" + dps_i.toFixed(2) + "</td><td class='right actual mono'>" + dps_act.toFixed(2) + "</td></tr>";

        document.getElementById('analysis-tbody').innerHTML = 
            "<tr><td>Buff Applied</td><td class='right mono'>" + fr_b.toFixed(1) + "%</td></tr>" +
            "<tr><td>Real Firerate Increase</td><td class='right mono'>" + fr_inc_pct.toFixed(2) + "%</td></tr>" +
            "<tr><td>ROF Bug DPS Loss</td><td class='right loss-value mono'>" + dps_loss.toFixed(2) + " (" + dps_loss_pct.toFixed(2) + "%)</td></tr>";

        buffStatsContainer.style.display = 'block';
    } else {
        document.getElementById('analysis-tbody').innerHTML = 
            "<tr><td>ROF Bug DPS Loss</td><td class='right loss-value mono'>" + b_dps_loss.toFixed(2) + " (" + b_dps_loss_pct.toFixed(2) + "%)</td></tr>";

        buffStatsContainer.style.display = 'none';
    }

    res.style.display = 'flex';
}

document.getElementById('b_fr').addEventListener('input', calculate);
document.getElementById('b_dmg').addEventListener('input', calculate);
document.getElementById('fr_b').addEventListener('input', calculate);

</script>
</body>
</html>
