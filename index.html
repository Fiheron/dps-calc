<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS ROF Calculator</title>
<style>
body {
    background-color: #12141a;
    color: #e2e8f0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header {
    text-align: center;
    background: #1e212b;
    border: 1px solid #2cf2ed;
    box-shadow: 0 8px 32px rgba(44, 242, 237, 0.15);
    padding: 25px 50px;
    border-radius: 12px;
    margin-bottom: 40px;
}
.header h1 {
    color: #2cf2ed;
    margin: 0 0 8px 0;
    font-size: 28px;
    letter-spacing: 1px;
}
.header p {
    color: #94a3b8;
    margin: 0;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 2px;
}
.input-section {
    background: #1e212b;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    width: 100%;
    max-width: 420px;
    margin-bottom: 40px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    color: #2cf2ed;
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 8px;
}
.form-group input {
    width: 100%;
    padding: 12px 15px;
    background: #12141a;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #fff;
    font-family: 'Consolas', monospace;
    font-size: 16px;
    box-sizing: border-box;
    transition: all 0.3s ease;
}
.form-group input:focus {
    border-color: #2cf2ed;
    outline: none;
    box-shadow: 0 0 0 3px rgba(44, 242, 237, 0.2);
}
button {
    width: 100%;
    padding: 14px;
    background-color: #2cf2ed;
    color: #0f172a;
    border: none;
    font-weight: 700;
    font-size: 16px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.3s ease;
}
button:hover {
    background-color: #1ce0db;
    box-shadow: 0 4px 15px rgba(44, 242, 237, 0.4);
    transform: translateY(-1px);
}
button:active {
    transform: translateY(1px);
}
.results-section {
    display: none;
    width: 100%;
    max-width: 540px;
}
.table-container {
    margin-bottom: 30px;
    border-radius: 10px;
    overflow: hidden;
    background: #1e212b;
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 14px 20px;
    text-align: left;
    border-bottom: 1px solid #2a3142;
}
th {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1px;
}
td {
    font-family: 'Consolas', monospace;
    font-size: 15px;
}
td.right {
    text-align: right;
    font-weight: bold;
}
.table-base { border-top: 4px solid #2cf2ed; }
.table-base th { background: rgba(44, 242, 237, 0.1); color: #2cf2ed; }
.table-base td.right { color: #f8fafc; }

.table-final { border-top: 4px solid #4ade80; }
.table-final th { background: rgba(74, 222, 128, 0.1); color: #4ade80; }
.table-final td.ideal { color: #64748b; font-weight: normal; text-align: right; }
.table-final td.actual { color: #4ade80; text-align: right; font-weight: bold; font-size: 16px; }

.table-analysis { border-top: 4px solid #facc15; }
.table-analysis th { background: rgba(250, 204, 21, 0.1); color: #facc15; }
.table-analysis td { color: #fde047; }
.table-analysis td.loss-value { color: #fca5a5; }

tr:last-child td { border-bottom: none; }

.error {
    color: #f87171;
    font-weight: 600;
    margin-bottom: 20px;
    display: none;
    text-align: center;
    border: 1px solid rgba(248, 113, 113, 0.3);
    padding: 12px;
    background: rgba(248, 113, 113, 0.1);
    border-radius: 6px;
}
</style>
</head>
<body>

<div class="header">
    <h1>TDS ROF CALCULATOR</h1>
    <p>Firerate & DPS Analyzer</p>
</div>

<div class="input-section">
    <div id="error-msg" class="error"></div>
    <div class="form-group">
        <label>Enter base firerate:</label>
        <input type="text" id="b_fr" autocomplete="off">
    </div>
    <div class="form-group">
        <label>Enter base damage per shot:</label>
        <input type="text" id="b_dmg" autocomplete="off">
    </div>
    <div class="form-group">
        <label>Enter total firerate buff % (Leave empty for 0):</label>
        <input type="text" id="fr_b" autocomplete="off">
    </div>
    <button onclick="calculate()">CALCULATE</button>
</div>

<div class="results-section" id="results">
    <div class="table-container table-base">
        <table>
            <thead>
                <tr><th colspan="2">BASE STATS (No Buffs)</th></tr>
                <tr><th>Metric</th><th class="right">Value</th></tr>
            </thead>
            <tbody id="base-tbody"></tbody>
        </table>
    </div>

    <div class="table-container table-final">
        <table>
            <thead>
                <tr><th colspan="3">FINAL PERFORMANCE</th></tr>
                <tr><th>Metric</th><th class="right" style="color:#64748b;font-weight:normal;">IDEAL</th><th class="right">ACTUAL</th></tr>
            </thead>
            <tbody id="final-tbody"></tbody>
        </table>
    </div>

    <div class="table-container table-analysis">
        <table>
            <thead>
                <tr><th colspan="2">ANALYSIS</th></tr>
                <tr><th>Effectiveness Metric</th><th class="right">Value</th></tr>
            </thead>
            <tbody id="analysis-tbody"></tbody>
        </table>
    </div>
</div>

<script>
function parseInput(val) {
    if (!val) return "";
    return val.replace(',', '.');
}

function getRobloxFrames(seconds) {
    const EPSILON = 1e-9;
    let raw_frames = seconds * 60;
    
    if (Math.abs(raw_frames - Math.round(raw_frames)) < EPSILON) {
        return Math.round(raw_frames) + 1.5;
    } else {
        return Math.ceil(raw_frames) + 1;
    }
}

function calculate() {
    document.getElementById('error-msg').style.display = 'none';
    
    let b_fr_str = parseInput(document.getElementById('b_fr').value);
    let b_dmg_str = parseInput(document.getElementById('b_dmg').value);
    let fr_b_str = parseInput(document.getElementById('fr_b').value);
    
    if (!b_fr_str || !b_dmg_str) {
        document.getElementById('error-msg').innerText = "Invalid Input\nPlease enter valid numbers.";
        document.getElementById('error-msg').style.display = 'block';
        return;
    }
    
    let b_fr = parseFloat(b_fr_str);
    let b_dmg = parseFloat(b_dmg_str);
    let fr_b = fr_b_str ? parseFloat(fr_b_str) : 0.0;
    
    if (isNaN(b_fr) || isNaN(b_dmg) || isNaN(fr_b)) {
        document.getElementById('error-msg').innerText = "Invalid Input\nPlease enter valid numbers.";
        document.getElementById('error-msg').style.display = 'block';
        return;
    }

    let b_dps_i = b_dmg / b_fr;
    let b_frames = getRobloxFrames(b_fr);
    let b_fr_act = b_frames / 60;
    let b_sps_act = 1 / b_fr_act;
    let b_dps_act = b_dmg * b_sps_act;

    let fr_i = b_fr / (1 + fr_b / 100);
    let sps_i = 1 / fr_i;
    let dps_i = b_dmg * sps_i;
    
    let final_frames = getRobloxFrames(fr_i);
    let fr_act = final_frames / 60;
    let sps_act = 1 / fr_act;
    let dps_act = b_dmg * sps_act;
    
    let fr_inc_pct = 0;
    let dps_inc_pct = 0;
    
    if (b_sps_act > 0) {
        fr_inc_pct = ((sps_act - b_sps_act) / b_sps_act) * 100;
        dps_inc_pct = ((dps_act - b_dps_act) / b_dps_act) * 100;
    }

    let dps_loss = dps_i - dps_act;
    let dps_loss_pct = 0;
    if (dps_i > 0) {
        dps_loss_pct = (dps_loss / dps_i) * 100;
    }

    document.getElementById('base-tbody').innerHTML = 
        "<tr><td>Base Firerate</td><td class='right'>" + b_fr.toFixed(6) + "s</td></tr>" +
        "<tr><td>Base Damage</td><td class='right'>" + b_dmg + "</td></tr>" +
        "<tr><td>Ideal DPS</td><td class='right'>" + b_dps_i.toFixed(2) + "</td></tr>" +
        "<tr><td>Actual Firerate</td><td class='right'>" + b_fr_act.toFixed(6) + "s</td></tr>" +
        "<tr><td>Actual DPS</td><td class='right'>" + b_dps_act.toFixed(2) + "</td></tr>";

    document.getElementById('final-tbody').innerHTML = 
        "<tr><td>Firerate</td><td class='ideal'>" + fr_i.toFixed(6) + "s</td><td class='actual'>" + fr_act.toFixed(6) + "s</td></tr>" +
        "<tr><td>Shots/sec</td><td class='ideal'>" + sps_i.toFixed(2) + "</td><td class='actual'>" + sps_act.toFixed(2) + "</td></tr>" +
        "<tr><td>DPS</td><td class='ideal'>" + dps_i.toFixed(2) + "</td><td class='actual'>" + dps_act.toFixed(2) + "</td></tr>";

    document.getElementById('analysis-tbody').innerHTML = 
        "<tr><td>Buff Applied</td><td class='right'>" + fr_b.toFixed(1) + "%</td></tr>" +
        "<tr><td>Real Firerate Increase</td><td class='right'>" + fr_inc_pct.toFixed(2) + "%</td></tr>" +
        "<tr><td>Real DPS Increase</td><td class='right'>" + dps_inc_pct.toFixed(2) + "%</td></tr>" +
        "<tr><td>DPS Loss vs Ideal</td><td class='right loss-value'>" + dps_loss.toFixed(2) + " (" + dps_loss_pct.toFixed(2) + "%)</td></tr>";

    document.getElementById('results').style.display = 'block';
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        calculate();
    }
});
</script>
</body>
</html>
