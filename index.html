<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS ROF Calculator</title>
<style>
body {
    background-color: #0c0c0c;
    color: #e0e0e0;
    font-family: 'Segoe UI', 'Roboto', monospace;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header {
    text-align: center;
    border: 1px solid #00ffff;
    padding: 20px 60px;
    border-radius: 8px;
    margin-bottom: 40px;
    background: rgba(0, 255, 255, 0.05);
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.1);
}
.header h1 {
    color: #00ffff;
    margin: 0 0 5px 0;
    font-size: 24px;
    letter-spacing: 1px;
}
.header p {
    color: #aaaaaa;
    margin: 0;
    font-size: 12px;
}
.input-section {
    background: #111;
    padding: 30px;
    border-radius: 8px;
    border: 1px solid #333;
    width: 100%;
    max-width: 450px;
    margin-bottom: 30px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    color: #00ffff;
    font-weight: bold;
    margin-bottom: 8px;
    font-size: 14px;
}
.form-group input {
    width: 100%;
    padding: 10px;
    background: #000;
    border: 1px solid #444;
    color: #fff;
    font-family: 'Consolas', monospace;
    box-sizing: border-box;
    border-radius: 4px;
}
.form-group input:focus {
    outline: none;
    border-color: #00ffff;
}
button {
    width: 100%;
    padding: 12px;
    background-color: #00ffff;
    color: #000;
    border: none;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    font-size: 14px;
    transition: 0.2s;
}
button:hover {
    background-color: #00cccc;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
}
.results-section {
    display: none;
    width: 100%;
    max-width: 600px;
}
.table-container {
    margin-bottom: 25px;
    border-radius: 8px;
    overflow: hidden;
}
.table-header {
    padding: 10px 15px;
    font-weight: bold;
    text-transform: uppercase;
    font-size: 14px;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    letter-spacing: 1px;
}
table {
    width: 100%;
    border-collapse: collapse;
    background: #111;
}
td {
    padding: 10px 15px;
    border-bottom: 1px solid #222;
    font-family: 'Consolas', monospace;
    font-size: 14px;
}
td.label {
    color: #ccc;
}
td.val {
    text-align: right;
    font-weight: bold;
    color: #fff;
}
.base-head { background: #002222; color: #00ffff; border: 1px solid #00ffff; border-bottom: none; }
.base-table { border: 1px solid #00ffff; border-top: none; }
.base-table td.label { color: #00ffff; }
.final-head { background: #002200; color: #00ff00; border: 1px solid #00ff00; border-bottom: none; }
.final-table { border: 1px solid #00ff00; border-top: none; }
.final-table td.ideal { color: #666; font-weight: normal; text-align: right; }
.final-table td.actual { color: #00ff00; text-align: right; }
.final-table th { text-align: right; color: #888; font-weight: normal; font-size: 12px; padding: 5px 15px; border-bottom: 1px solid #222; }
.anl-head { background: #222200; color: #ffff00; border: 1px solid #ffff00; border-bottom: none; }
.anl-table { border: 1px solid #ffff00; border-top: none; }
.anl-table td.label { color: #ffff00; }
.anl-table td.val { color: #ffff00; }
.anl-table td.loss { color: #ff5555; }
.error {
    color: #ff5555;
    text-align: center;
    margin-bottom: 15px;
    display: none;
    border: 1px solid #ff5555;
    padding: 10px;
    background: #220000;
    border-radius: 4px;
}
</style>
</head>
<body>

<div class="header">
    <h1>TDS ROF CALCULATOR</h1>
    <p>Firerate & DPS Analyzer</p>
</div>

<div class="input-section">
    <div id="error-msg" class="error"></div>
    <div class="form-group">
        <label>Base Firerate</label>
        <input type="text" id="b_fr" autocomplete="off" placeholder="e.g. 0.1">
    </div>
    <div class="form-group">
        <label>Base Damage</label>
        <input type="text" id="b_dmg" autocomplete="off" placeholder="e.g. 10">
    </div>
    <div class="form-group">
        <label>Firerate Buff % (Optional)</label>
        <input type="text" id="fr_b" autocomplete="off" placeholder="0">
    </div>
    <div class="form-group">
        <label>Damage Buff % (Optional)</label>
        <input type="text" id="dmg_b" autocomplete="off" placeholder="0">
    </div>
    <button onclick="calculate()">CALCULATE</button>
</div>

<div class="results-section" id="results">
    
    <div class="table-container">
        <div class="table-header base-head">BASE STATS (No Buffs)</div>
        <table class="base-table" id="tbl_base"></table>
    </div>

    <div class="table-container">
        <div class="table-header final-head">FINAL PERFORMANCE</div>
        <table class="final-table" id="tbl_final"></table>
    </div>

    <div class="table-container">
        <div class="table-header anl-head">ANALYSIS</div>
        <table class="anl-table" id="tbl_anl"></table>
    </div>

</div>

<script>
function parseInput(val) {
    if (!val) return "";
    return val.replace(',', '.');
}

function getRobloxFrames(seconds) {
    const EPSILON = 1e-9;
    let raw_frames = seconds * 60;
    
    if (Math.abs(raw_frames - Math.round(raw_frames)) < EPSILON) {
        return Math.round(raw_frames) + 1.5;
    } else {
        return Math.ceil(raw_frames) + 1;
    }
}

function calculate() {
    document.getElementById('error-msg').style.display = 'none';
    
    let b_fr_str = parseInput(document.getElementById('b_fr').value);
    let b_dmg_str = parseInput(document.getElementById('b_dmg').value);
    let fr_b_str = parseInput(document.getElementById('fr_b').value);
    let dmg_b_str = parseInput(document.getElementById('dmg_b').value);
    
    if (!b_fr_str || !b_dmg_str) {
        document.getElementById('error-msg').innerText = "Please enter valid numbers.";
        document.getElementById('error-msg').style.display = 'block';
        return;
    }
    
    let b_fr = parseFloat(b_fr_str);
    let b_dmg = parseFloat(b_dmg_str);
    let fr_b = fr_b_str ? parseFloat(fr_b_str) : 0.0;
    let dmg_b = dmg_b_str ? parseFloat(dmg_b_str) : 0.0;
    
    if (isNaN(b_fr) || isNaN(b_dmg) || isNaN(fr_b) || isNaN(dmg_b)) {
        document.getElementById('error-msg').innerText = "Please enter valid numbers.";
        document.getElementById('error-msg').style.display = 'block';
        return;
    }

    let b_dps_i = b_dmg / b_fr;
    let b_frames = getRobloxFrames(b_fr);
    let b_fr_act = b_frames / 60;
    let b_sps_act = 1 / b_fr_act;
    let b_dps_act = b_dmg * b_sps_act;

    let fr_i = b_fr / (1 + fr_b / 100);
    let sps_i = 1 / fr_i;
    
    let final_dmg = Math.floor(b_dmg * (1 + dmg_b / 100));
    
    let final_frames = getRobloxFrames(fr_i);
    let fr_act = final_frames / 60;
    let sps_act = 1 / fr_act;
    
    let dps_i = final_dmg * sps_i;
    let dps_act = final_dmg * sps_act;
    
    let fr_inc_pct = 0;
    let dps_inc_pct = 0;
    if (b_sps_act > 0) {
        fr_inc_pct = ((sps_act - b_sps_act) / b_sps_act) * 100;
    }
    if (b_dps_act > 0) {
        dps_inc_pct = ((dps_act - b_dps_act) / b_dps_act) * 100;
    }

    let dps_loss = dps_i - dps_act;
    let dps_loss_pct = 0;
    if (dps_i > 0) {
        dps_loss_pct = (dps_loss / dps_i) * 100;
    }

    let html_base = "";
    html_base += "<tr><td class='label'>Base Firerate</td><td class='val'>" + b_fr.toFixed(6) + "s</td></tr>";
    html_base += "<tr><td class='label'>Base Damage</td><td class='val'>" + b_dmg + "</td></tr>";
    html_base += "<tr><td class='label'>Ideal DPS</td><td class='val'>" + b_dps_i.toFixed(2) + "</td></tr>";
    html_base += "<tr><td class='label'>Actual Firerate</td><td class='val'>" + b_fr_act.toFixed(6) + "s</td></tr>";
    html_base += "<tr><td class='label'>Actual DPS</td><td class='val'>" + b_dps_act.toFixed(2) + "</td></tr>";
    document.getElementById('tbl_base').innerHTML = html_base;

    let html_final = "<thead><tr><th>Metric</th><th>IDEAL</th><th>ACTUAL</th></tr></thead><tbody>";
    html_final += "<tr><td class='label'>Damage</td><td class='ideal'>" + final_dmg + "</td><td class='actual'>" + final_dmg + "</td></tr>";
    html_final += "<tr><td class='label'>Firerate</td><td class='ideal'>" + fr_i.toFixed(6) + "s</td><td class='actual'>" + fr_act.toFixed(6) + "s</td></tr>";
    html_final += "<tr><td class='label'>Shots/sec</td><td class='ideal'>" + sps_i.toFixed(2) + "</td><td class='actual'>" + sps_act.toFixed(2) + "</td></tr>";
    html_final += "<tr><td class='label'>DPS</td><td class='ideal'>" + dps_i.toFixed(2) + "</td><td class='actual'>" + dps_act.toFixed(2) + "</td></tr>";
    html_final += "</tbody>";
    document.getElementById('tbl_final').innerHTML = html_final;

    let html_anl = "";
    html_anl += "<tr><td class='label'>Firerate Buff Applied</td><td class='val'>" + fr_b.toFixed(1) + "%</td></tr>";
    html_anl += "<tr><td class='label'>Damage Buff Applied</td><td class='val'>" + dmg_b.toFixed(1) + "%</td></tr>";
    html_anl += "<tr><td class='label'>Real Firerate Inc.</td><td class='val'>" + fr_inc_pct.toFixed(2) + "%</td></tr>";
    html_anl += "<tr><td class='label'>Real DPS Inc.</td><td class='val'>" + dps_inc_pct.toFixed(2) + "%</td></tr>";
    html_anl += "<tr><td class='label'>ROF Bug DPS Loss</td><td class='val loss'>" + dps_loss.toFixed(2) + " (" + dps_loss_pct.toFixed(2) + "%)</td></tr>";
    document.getElementById('tbl_anl').innerHTML = html_anl;

    document.getElementById('results').style.display = 'block';
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        calculate();
    }
});
</script>
</body>
</html>
