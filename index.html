<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TDS ROF Calculator</title>
<style>
body {
    background-color: #0f1115;
    color: #e2e8f0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    margin: 0;
    padding: 40px 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
}
.header {
    text-align: center;
    background: #181b21;
    border: 1px solid #2cf2ed;
    box-shadow: 0 0 20px rgba(44, 242, 237, 0.1);
    padding: 25px 50px;
    border-radius: 12px;
    margin-bottom: 40px;
}
.header h1 {
    color: #2cf2ed;
    margin: 0 0 8px 0;
    font-size: 28px;
    letter-spacing: 1px;
    text-shadow: 0 0 10px rgba(44, 242, 237, 0.3);
}
.header p {
    color: #94a3b8;
    margin: 0;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 3px;
}
.input-section {
    background: #181b21;
    padding: 30px;
    border-radius: 12px;
    border: 1px solid #2a3142;
    width: 100%;
    max-width: 420px;
    margin-bottom: 40px;
}
.form-group {
    margin-bottom: 20px;
}
.form-group label {
    display: block;
    color: #2cf2ed;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}
.form-group input {
    width: 100%;
    padding: 12px 15px;
    background: #0f1115;
    border: 1px solid #334155;
    border-radius: 6px;
    color: #fff;
    font-family: 'Consolas', monospace;
    font-size: 16px;
    box-sizing: border-box;
    transition: all 0.2s ease;
}
.form-group input:focus {
    border-color: #2cf2ed;
    outline: none;
    box-shadow: 0 0 0 2px rgba(44, 242, 237, 0.1);
}
button {
    width: 100%;
    padding: 14px;
    background-color: #2cf2ed;
    color: #0f172a;
    border: none;
    font-weight: 800;
    font-size: 15px;
    letter-spacing: 1px;
    cursor: pointer;
    border-radius: 6px;
    transition: all 0.2s ease;
    margin-top: 10px;
}
button:hover {
    background-color: #1ce0db;
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(44, 242, 237, 0.2);
}
.results-section {
    display: none;
    width: 100%;
    max-width: 600px;
}
.table-container {
    margin-bottom: 30px;
    border-radius: 10px;
    overflow: hidden;
    background: #181b21;
    border: 1px solid #2a3142;
}
table {
    width: 100%;
    border-collapse: collapse;
}
th, td {
    padding: 12px 20px;
    text-align: left;
    border-bottom: 1px solid #2a3142;
}
th {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 700;
}
td {
    font-family: 'Consolas', monospace;
    font-size: 15px;
}
td.right {
    text-align: right;
    font-weight: bold;
}
tbody tr:nth-child(even) {
    background-color: rgba(255, 255, 255, 0.02);
}
.table-base { border-top: 3px solid #2cf2ed; }
.table-base th { background: rgba(44, 242, 237, 0.05); color: #2cf2ed; }
.table-base td.right { color: #f8fafc; }

.table-final { border-top: 3px solid #4ade80; }
.table-final th { background: rgba(74, 222, 128, 0.05); color: #4ade80; }
.table-final td.ideal { color: #64748b; font-weight: normal; text-align: right; }
.table-final td.actual { color: #4ade80; text-align: right; font-weight: bold; font-size: 16px; }

.table-analysis { border-top: 3px solid #facc15; }
.table-analysis th { background: rgba(250, 204, 21, 0.05); color: #facc15; }
.table-analysis td { color: #e2e8f0; }
.table-analysis td.highlight { color: #facc15; font-weight: bold; }
.table-analysis td.loss { color: #f87171; }
.table-analysis td.gain { color: #4ade80; }
.table-analysis td.metric-name { color: #94a3b8; font-family: 'Segoe UI', sans-serif; font-size: 14px; }

.error {
    color: #f87171;
    font-weight: 600;
    margin-bottom: 20px;
    display: none;
    text-align: center;
    border: 1px solid rgba(248, 113, 113, 0.3);
    padding: 12px;
    background: rgba(248, 113, 113, 0.1);
    border-radius: 6px;
    font-size: 14px;
}
</style>
</head>
<body>

<div class="header">
    <h1>TDS ROF CALCULATOR</h1>
    <p>Firerate & DPS Analyzer</p>
</div>

<div class="input-section">
    <div id="error-msg" class="error"></div>
    <div class="form-group">
        <label>Base Firerate (Seconds)</label>
        <input type="text" id="b_fr" autocomplete="off" placeholder="e.g. 0.1">
    </div>
    <div class="form-group">
        <label>Base Damage (Per Shot)</label>
        <input type="text" id="b_dmg" autocomplete="off" placeholder="e.g. 10">
    </div>
    <div class="form-group">
        <label>Firerate Buff % (Optional)</label>
        <input type="text" id="fr_b" autocomplete="off" placeholder="e.g. 50">
    </div>
    <div class="form-group">
        <label>Damage Buff % (Optional)</label>
        <input type="text" id="dmg_b" autocomplete="off" placeholder="e.g. 20">
    </div>
    <button onclick="calculate()">CALCULATE STATS</button>
</div>

<div class="results-section" id="results">
    
    <div class="table-container table-base">
        <table>
            <thead>
                <tr><th colspan="2">Starting Stats (No Buffs)</th></tr>
            </thead>
            <tbody id="base-tbody"></tbody>
        </table>
    </div>

    <div class="table-container table-final">
        <table>
            <thead>
                <tr>
                    <th>Metric</th>
                    <th class="right" style="color:#64748b;">Paper Stats (Ideal)</th>
                    <th class="right">In-Game Stats (Actual)</th>
                </tr>
            </thead>
            <tbody id="final-tbody"></tbody>
        </table>
    </div>

    <div class="table-container table-analysis">
        <table>
            <thead>
                <tr><th colspan="2">Deep Analysis</th></tr>
            </thead>
            <tbody id="analysis-tbody"></tbody>
        </table>
    </div>
</div>

<script>
function parseInput(val) {
    if (!val) return "";
    return val.replace(',', '.');
}

function getRobloxFrames(seconds) {
    const EPSILON = 1e-9;
    let raw_frames = seconds * 60;
    
    if (Math.abs(raw_frames - Math.round(raw_frames)) < EPSILON) {
        return Math.round(raw_frames) + 1.5;
    } else {
        return Math.ceil(raw_frames) + 1;
    }
}

function calculate() {
    document.getElementById('error-msg').style.display = 'none';
    
    let b_fr_str = parseInput(document.getElementById('b_fr').value);
    let b_dmg_str = parseInput(document.getElementById('b_dmg').value);
    let fr_b_str = parseInput(document.getElementById('fr_b').value);
    let dmg_b_str = parseInput(document.getElementById('dmg_b').value);
    
    if (!b_fr_str || !b_dmg_str) {
        document.getElementById('error-msg').innerText = "Please enter Base Firerate and Base Damage.";
        document.getElementById('error-msg').style.display = 'block';
        return;
    }
    
    let b_fr = parseFloat(b_fr_str);
    let b_dmg = parseFloat(b_dmg_str);
    let fr_b = fr_b_str ? parseFloat(fr_b_str) : 0.0;
    let dmg_b = dmg_b_str ? parseFloat(dmg_b_str) : 0.0;
    
    if (isNaN(b_fr) || isNaN(b_dmg) || isNaN(fr_b) || isNaN(dmg_b)) {
        document.getElementById('error-msg').innerText = "Invalid numbers entered.";
        document.getElementById('error-msg').style.display = 'block';
        return;
    }

    let b_dps_i = b_dmg / b_fr;
    let b_frames = getRobloxFrames(b_fr);
    let b_fr_act = b_frames / 60;
    let b_sps_act = 1 / b_fr_act;
    let b_dps_act = b_dmg * b_sps_act;

    let fr_i = b_fr / (1 + fr_b / 100);
    let sps_i = 1 / fr_i;
    
    let final_dmg = Math.floor(b_dmg * (1 + dmg_b / 100));
    
    let dps_i_full = final_dmg * sps_i;
    
    let final_frames = getRobloxFrames(fr_i);
    let fr_act = final_frames / 60;
    let sps_act = 1 / fr_act;
    
    let dps_act_final = final_dmg * sps_act;
    
    let dps_loss = dps_i_full - dps_act_final;
    let dps_loss_pct = 0;
    if (dps_i_full > 0) {
        dps_loss_pct = (dps_loss / dps_i_full) * 100;
    }

    let efficiency = 100 - dps_loss_pct;
    let efficiency_color = efficiency > 90 ? "#4ade80" : (efficiency > 75 ? "#facc15" : "#f87171");

    let total_dps_inc = 0;
    if (b_dps_act > 0) {
        total_dps_inc = ((dps_act_final - b_dps_act) / b_dps_act) * 100;
    }

    let real_fr_buff = 0;
    if (b_sps_act > 0) {
        real_fr_buff = ((sps_act - b_sps_act) / b_sps_act) * 100;
    }

    document.getElementById('base-tbody').innerHTML = 
        "<tr><td class='metric-name'>Base Firerate</td><td class='right'>" + b_fr.toFixed(6) + "s</td></tr>" +
        "<tr><td class='metric-name'>Base Damage</td><td class='right'>" + b_dmg + "</td></tr>" +
        "<tr><td class='metric-name'>Base DPS (Actual)</td><td class='right'>" + b_dps_act.toFixed(2) + "</td></tr>";

    document.getElementById('final-tbody').innerHTML = 
        "<tr><td class='metric-name'>Firerate</td><td class='ideal'>" + fr_i.toFixed(6) + "s</td><td class='actual'>" + fr_act.toFixed(6) + "s</td></tr>" +
        "<tr><td class='metric-name'>Damage</td><td class='ideal'>" + final_dmg + "</td><td class='actual'>" + final_dmg + "</td></tr>" +
        "<tr><td class='metric-name'>DPS</td><td class='ideal'>" + dps_i_full.toFixed(2) + "</td><td class='actual'>" + dps_act_final.toFixed(2) + "</td></tr>";

    document.getElementById('analysis-tbody').innerHTML = 
        "<tr><td class='metric-name'>True Firerate Buff</td><td class='right highlight'>+" + real_fr_buff.toFixed(2) + "% <span style='color:#64748b;font-weight:normal;font-size:12px'>(Input: " + fr_b + "%)</span></td></tr>" +
        "<tr><td class='metric-name'>Total DPS Increase</td><td class='right gain'>+" + total_dps_inc.toFixed(2) + "%</td></tr>" +
        "<tr><td class='metric-name'>Efficiency Rating</td><td class='right' style='color:" + efficiency_color + "'>" + efficiency.toFixed(2) + "%</td></tr>" +
        "<tr><td class='metric-name'>DPS Lost to Bug</td><td class='right loss'>" + dps_loss.toFixed(2) + "</td></tr>";

    document.getElementById('results').style.display = 'block';
}

document.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        calculate();
    }
});
</script>
</body>
</html>
